<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620" role="img" aria-labelledby="title desc">
  <title id="title">Katz分形维数中的曲线总长度L与最大距离d</title>
  <desc id="desc">一段包含20个采样点的曲折时间序列折线图。蓝色折线表示沿曲线逐段累加得到的曲线总长度L，红色虚线表示从起点到曲线上最远点的最大距离d。</desc>
  <defs>
    <marker id="axis-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#64748b"/>
    </marker>
    <marker id="red-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#d64545"/>
    </marker>
    <marker id="orange-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#f59e0b"/>
    </marker>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#1f2937" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1000" height="620" fill="#f7fafc"/>
  <text x="500" y="38" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700" fill="#1f2937">
    Katz分形维数：曲线总长度 L 与最大距离 d
  </text>

  <rect x="70" y="62" width="860" height="462" rx="18" fill="#ffffff" stroke="#d8e0ea" filter="url(#soft-shadow)"/>

  <!-- Axes -->
  <line x1="120" y1="450" x2="860" y2="450" stroke="#64748b" stroke-width="2.5" marker-end="url(#axis-arrow)"/>
  <line x1="120" y1="450" x2="120" y2="112" stroke="#64748b" stroke-width="2.5" marker-end="url(#axis-arrow)"/>
  <text x="866" y="481" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" fill="#475569">时间 t</text>
  <text x="78" y="108" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" fill="#475569">数值 X(t)</text>

  <!-- Grid -->
  <g stroke="#e5edf5" stroke-width="1">
    <line x1="120" y1="382" x2="860" y2="382"/>
    <line x1="120" y1="314" x2="860" y2="314"/>
    <line x1="120" y1="246" x2="860" y2="246"/>
    <line x1="120" y1="178" x2="860" y2="178"/>
    <line x1="232" y1="450" x2="232" y2="112"/>
    <line x1="344" y1="450" x2="344" y2="112"/>
    <line x1="456" y1="450" x2="456" y2="112"/>
    <line x1="568" y1="450" x2="568" y2="112"/>
    <line x1="680" y1="450" x2="680" y2="112"/>
    <line x1="792" y1="450" x2="792" y2="112"/>
  </g>

  <!-- Time-series polyline with 20 sampled points -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline
      points="140,374 176,318 212,252 248,286 284,214 320,344 356,392 392,274 428,238 464,306 500,220 536,352 572,314 608,386 644,256 680,306 716,202 752,348 789,270 826,118"
      stroke="#2563eb" stroke-width="12" opacity="0.16"/>
    <polyline
      points="140,374 176,318 212,252 248,286 284,214 320,344 356,392 392,274 428,238 464,306 500,220 536,352 572,314 608,386 644,256 680,306 716,202 752,348 789,270 826,118"
      stroke="#2563eb" stroke-width="4.5"/>
  </g>

  <!-- Sample points -->
  <g fill="#2563eb" stroke="#ffffff" stroke-width="1.7">
    <circle cx="140" cy="374" r="6.5"/>
    <circle cx="176" cy="318" r="4"/>
    <circle cx="212" cy="252" r="4"/>
    <circle cx="248" cy="286" r="4"/>
    <circle cx="284" cy="214" r="4"/>
    <circle cx="320" cy="344" r="4"/>
    <circle cx="356" cy="392" r="4"/>
    <circle cx="392" cy="274" r="4"/>
    <circle cx="428" cy="238" r="4"/>
    <circle cx="464" cy="306" r="4"/>
    <circle cx="500" cy="220" r="4"/>
    <circle cx="536" cy="352" r="4"/>
    <circle cx="572" cy="314" r="4"/>
    <circle cx="608" cy="386" r="4"/>
    <circle cx="644" cy="256" r="4"/>
    <circle cx="680" cy="306" r="4"/>
    <circle cx="716" cy="202" r="4"/>
    <circle cx="752" cy="348" r="4"/>
    <circle cx="789" cy="270" r="4"/>
  </g>
  <circle cx="826" cy="118" r="7.5" fill="#d64545" stroke="#ffffff" stroke-width="2.5"/>

  <!-- Maximum distance d -->
  <line x1="140" y1="374" x2="826" y2="118" stroke="#d64545" stroke-width="4" stroke-dasharray="12 9"/>
  <text x="462" y="212" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#d64545">d</text>

  <!-- Start and farthest labels -->
  <g font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
    <rect x="109" y="390" width="62" height="26" rx="7" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="140" y="409" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">起点</text>
    <rect x="790" y="78" width="72" height="26" rx="7" fill="#fef2f2" stroke="#fecaca"/>
    <text x="826" y="97" text-anchor="middle" font-size="15" font-weight="700" fill="#c53030">最远点</text>
  </g>

  <!-- Legend -->
  <g font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#374151">
    <line x1="305" y1="560" x2="365" y2="560" stroke="#2563eb" stroke-width="4.5" stroke-linecap="round"/>
    <text x="382" y="566">蓝色折线：L</text>
    <line x1="555" y1="560" x2="615" y2="560" stroke="#d64545" stroke-width="4" stroke-dasharray="10 7" stroke-linecap="round"/>
    <text x="632" y="566">红色虚线：d</text>
  </g>
</svg>
